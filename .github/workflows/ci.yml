name: CI Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    security:
      runs-on: ubuntu-latest
    
      steps:
          - name: Run checkout
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
          - name: Set up Python
            uses: actions/setup-python@v5
            with:
              python-version: '3.11'
              cache: 'pip'
          - name: Install dependencies with pip
            run: |
                  python -m pip install --upgrade pip
                  pip install -r ./src/backend/requirements-dev.txt
          - name: Run ruff
            uses: astral-sh/ruff-action@v3
            with:
              version: "0.15.6"
              src: "./src/backend"
          - name: Run Bandit
            run: bandit -r ./src/backend
          - name: Run pip-audit
            uses: pypa/gh-action-pip-audit@v1.1.0
            with:
              inputs: ./src/backend/requirements.txt ./src/backend/requirements-dev.txt
          - name: Run Gitleaks
            uses: gitleaks/gitleaks-action@v2.3.9
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
      runs-on: ubuntu-latest
      needs: security

      steps:
        - name: Run checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'
            cache: 'pip'
        - name: Install dependencies with pip
          run: |
                python -m pip install --upgrade pip
                pip install -r ./src/backend/requirements.txt
                pip install -r ./src/backend/requirements-dev.txt
        - name: Run pytest
          run: pytest ./src/backend/tests/test_etl.py
        - name: Build docker
          run: docker build -t boxdmetrics-backend ./src/backend
    
    trivy:
      runs-on: ubuntu-latest
      needs: build

      steps:
        - name: Run checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'
            cache: 'pip'
        - name: Install dependencies with pip
          run: |
                python -m pip install --upgrade pip
                pip install -r ./src/backend/requirements.txt
                pip install -r ./src/backend/requirements-dev.txt
        - name: Run Trivy vulnerability scanner
          uses: aquasecurity/trivy-action@0.35.0
          with:
            image-ref: 'docker.io/my-organization/my-app:${{ github.sha }}'
            format: 'table'
            exit-code: '1'
            ignore-unfixed: true
            vuln-type: 'os,library'
            severity: 'CRITICAL,HIGH'
