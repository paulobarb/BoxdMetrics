services:
  backend:
    build: ./src/backend
    ports:
      - 8000:8000
    volumes:
      - ./src/backend:/app
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  prometheus:
    image: prom/prometheus:v3.10.0
    ports: 
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
  
  grafana:
    image: grafana/grafana:12.3.0
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
