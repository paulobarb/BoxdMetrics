name: CI Pipeline

on:
    push:
        branches:
            - main
            - feature/ci-pipeline
    pull_request:
        branches:
            - main

permissions:
  contents: read      
  packages: write

jobs:
    security:
      runs-on: ubuntu-latest
    
      steps:
          - name: Run checkout
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
          - name: Set up Python
            uses: actions/setup-python@v5
            with:
              python-version: '3.11'
              cache: 'pip'
          - name: Install dependencies with pip
            run: |
                  python -m pip install --upgrade pip
                  pip install -r ./src/backend/requirements-dev.txt
          - name: Run ruff
            uses: astral-sh/ruff-action@v3
            with:
              version: "0.15.6"
              src: "./src/backend"
          - name: Run Bandit
            run: bandit -r ./src/backend -x ./src/backend/tests
          - name: Run pip-audit
            uses: pypa/gh-action-pip-audit@v1.1.0
            with:
              inputs: ./src/backend/requirements.txt ./src/backend/requirements-dev.txt
          - name: Run Gitleaks
            uses: gitleaks/gitleaks-action@v2.3.9
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
      runs-on: ubuntu-latest
      needs: security

      steps:
        - name: Run checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'
            cache: 'pip'
        - name: Install dependencies with pip
          run: |
                python -m pip install --upgrade pip
                pip install -r ./src/backend/requirements.txt
                pip install -r ./src/backend/requirements-dev.txt
        - name: Run pytest
          env:
            PYTHONPATH: ./src/backend
          run: python -m pytest ./src/backend/tests/test_etl.py
        - name: Login to GHCR
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build and push image
          uses: docker/build-push-action@v6
          with:
           context: ./src/backend
           push: true
           tags: ghcr.io/${{ github.repository_owner }}/boxdmetrics-backend:${{ github.sha }}
    
    scan:
      runs-on: ubuntu-latest
      needs: build

      steps:
        - name: Run checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - name: Login to GHCR
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Run Trivy vulnerability scanner
          uses: aquasecurity/trivy-action@0.35.0
          with:
            image-ref: 'ghcr.io/${{ github.repository_owner }}/boxdmetrics-backend:${{ github.sha }}'
            format: 'table'
            exit-code: '1'
            ignore-unfixed: true
            vuln-type: 'os,library'
            severity: 'CRITICAL,HIGH'
